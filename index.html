<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FreeChat Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #f4f4f4; --dark: #333; --me-border: #90ee90; --other-border: #87ceeb; --accent: #0084ff; --system-bg: #fff9c4; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); height: 100vh; display: flex; overflow: hidden; }
        
        /* 레이아웃 */
        #sidebar { width: 70px; background: var(--dark); display: none; flex-direction: column; align-items: center; padding: 20px 0; gap: 20px; z-index: 100; }
        #main-content { flex: 1; display: none; flex-direction: column; background: white; position: relative; }
        .side-btn { width: 48px; height: 48px; background: #444; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; border: none; font-size: 20px; }
        .side-btn.active { background: var(--accent); }

        .section { display: none; height: 100%; flex-direction: column; padding: 20px; overflow-y: auto; }
        .section.active { display: flex; }

        /* 메시지 디자인 */
        .chat-box { flex: 1; overflow-y: auto; background: #f9f9f9; padding: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 12px; }
        .msg-bar { width: 100%; padding: 10px 12px; border-radius: 8px; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.05); border-left: 5px solid #ddd; }
        .msg-bar.me { border-left-color: var(--me-border); }
        .msg-bar.other { border-left-color: var(--other-border); }
        .msg-header { font-size: 12px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .msg-nick { font-weight: bold; color: #333; }
        .msg-date { color: #aaa; font-size: 11px; }
        .msg-content { font-size: 14px; color: #000; font-weight: 500; line-height: 1.4; word-break: break-all; }

        /* 공통 UI */
        .list-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 10px 15px; background: var(--dark); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 5px; }
        .guide { font-size: 11px; color: #888; margin-bottom: 15px; line-height: 1.4; }

        #offline-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; text-align: center; }
        
        /* 추가 스타일: 비밀번호 토글 */
        .pw-container { position: relative; width: 100%; }
        .pw-toggle { position: absolute; right: 12px; top: 12px; cursor: pointer; font-size: 18px; color: #888; }
    </style>
</head>
<body>

    <div id="offline-overlay">📶<br>Wi-Fi 신호가 불안정하거나 연결되지 않았습니다.</div>

    <div id="auth-section" style="position:fixed;width:100%;height:100%;background:var(--bg);z-index:2000;display:flex;justify-content:center;align-items:center;">
        <div style="background:white;padding:30px;border-radius:20px;width:90%;max-width:320px;text-align:center;">
            <h2 style="margin-bottom:20px;">FreeChat</h2>
            <input type="email" id="email" placeholder="이메일" style="width:100%;">
            <div class="pw-container">
                <input type="password" id="password" placeholder="비밀번호" style="width:100%;">
                <span class="pw-toggle" onclick="togglePassword('password', this)">👁️</span>
            </div>
            <button class="btn" style="width:100%; margin-top:10px;" onclick="login()">시작하기</button>
        </div>
    </div>

    <div id="setup-section" style="position:fixed;width:100%;height:100%;background:var(--bg);z-index:1900;display:none;justify-content:center;align-items:center;">
        <div style="background:white;padding:30px;border-radius:20px;width:90%;max-width:320px;">
            <h3 style="margin-top:0;">초기 프로필 설정</h3>
            <label style="font-size:12px;">닉네임</label>
            <input type="text" id="setup-nick" placeholder="(한글, 영문자, 숫자, 기호, 이모티콘 사용 가능)" style="width:100%;">
            <div class="guide">중복 가능, 표시용 / 1~100자</div>
            <label style="font-size:12px;">아이디(@)</label>
            <input type="text" id="setup-id" placeholder="(영문자, 숫자, ., _만 사용 가능)" style="width:100%;">
            <div class="guide">중복 불가능, 식별용 / 4~50자</div>
            <button class="btn" style="width:100%;" onclick="saveInitialProfile()">가입 완료</button>
        </div>
    </div>

    <div id="sidebar">
        <button class="side-btn active" onclick="changeTab('tab-chat', this)">🌐</button>
        <button class="side-btn" onclick="changeTab('tab-friends', this)">👥</button>
        <button class="side-btn" onclick="changeTab('tab-groups', this)">📢</button>
        <button class="side-btn" onclick="changeTab('tab-search', this)">🔍</button>
        <button class="side-btn" onclick="changeTab('tab-profile', this)">⚙️</button>
    </div>

    <div id="main-content">
        <div id="tab-chat" class="section active">
            <h3 style="margin-top:0;">광장</h3>
            <div id="chat-window" class="chat-box"></div>
            <div style="display:flex; gap:8px; padding-top:10px;">
                <input type="text" id="chat-input" style="flex:1;" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) sendMsg('public_msgs', 'chat-input')">
                <button class="btn" onclick="sendMsg('public_msgs', 'chat-input')">전송</button>
            </div>
        </div>

        <div id="tab-friends" class="section">
            <div id="request-section" style="display:none; background:#fff0f0; padding:15px; border-radius:10px; margin-bottom:15px;">
                <h4 style="margin:0 0 10px 0; color:red;">🔔 받은 친구 요청</h4>
                <div id="request-list"></div>
            </div>
            <div id="friends-list-view">
                <h3 style="margin-top:0;">친구 목록</h3>
                <div id="friends-list"></div>
            </div>
            <div id="dm-view" style="display:none; height:100%; flex-direction:column;">
                <button onclick="backToFriends()" style="border:none;background:none;color:var(--accent);padding:10px 0;text-align:left;font-weight:bold;">← 목록으로</button>
                <div id="dm-chat" class="chat-box"></div>
                <div style="display:flex; gap:8px; padding-top:10px;">
                    <input type="text" id="dm-input" style="flex:1;" onkeypress="if(event.keyCode==13) sendDMMsg()">
                    <button class="btn" onclick="sendDMMsg()">전송</button>
                </div>
            </div>
        </div>

        <div id="tab-groups" class="section">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <h3 style="margin:0;">그룹 채팅</h3>
                <button class="btn" style="font-size:12px;" onclick="toggleGroupCreate()">+ 그룹 생성</button>
            </div>
            <div id="group-create-ui" style="display:none; background:#eee; padding:15px; border-radius:10px; margin-bottom:15px;">
                <input type="text" id="group-name-input" placeholder="그룹 이름" style="width:100%;">
                <p style="font-size:12px; margin:10px 0 5px;">초대할 친구 선택:</p>
                <div id="group-friend-selector" style="max-height:120px; overflow-y:auto; background:white; padding:10px; border-radius:8px;"></div>
                <button class="btn" style="width:100%; margin-top:10px;" onclick="createGroup()">생성</button>
            </div>
            <div id="groups-list"></div>

            <div id="group-chat-view" style="display:none; height:100%; flex-direction:column; position:absolute; top:0; left:0; width:100%; background:white; padding:20px; z-index:200;">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <button onclick="document.getElementById('group-chat-view').style.display='none'" style="border:none;background:none;color:var(--accent);font-weight:bold;">←</button>
                    <div style="text-align:center;">
                        <h4 id="group-chat-title" style="margin:0;"></h4>
                        <div id="group-member-info" style="font-size:11px; color:#888; cursor:pointer; text-decoration:underline; margin-top:4px;" onclick="showGroupMembers()"></div>
                    </div>
                    <button onclick="leaveGroup()" style="border:none;background:none;color:red;font-weight:bold;font-size:13px;">나가기</button>
                </div>
                <div id="group-chat-window" class="chat-box" style="margin-top:15px;"></div>
                <div style="display:flex; gap:8px; padding-top:10px;">
                    <input type="text" id="group-input" style="flex:1;" onkeypress="if(event.keyCode==13) sendGroupMsg()">
                    <button class="btn" onclick="sendGroupMsg()">전송</button>
                </div>
            </div>
        </div>

        <div id="tab-search" class="section">
            <h3 style="margin-top:0;">사용자 검색</h3>
            <input type="text" id="search-input" placeholder="아이디로 검색..." oninput="searchUser()" style="width:100%;">
            <div id="search-result"></div>
        </div>

        <div id="tab-profile" class="section">
            <h3 style="margin-top:0;">프로필 설정</h3>
            <label style="font-size:13px; font-weight:bold;">닉네임 변경</label>
            <input type="text" id="edit-nick" style="width:100%;">
            <div class="guide">중복 가능, 표시용 / 1~100자</div>
            <button class="btn" onclick="updateNick()">닉네임 저장</button>
            <hr style="margin:25px 0; border:0; border-top:1px solid #eee;">
            <label style="font-size:13px; font-weight:bold;">아이디(@) 변경</label>
            <input type="text" id="edit-id" style="width:100%;">
            <div class="guide">중복 불가능, 식별용 / 4~50자<br>아이디는 7일마다 1번 변경 가능합니다.</div>
            <button class="btn" onclick="updateID()">아이디 저장</button>
            <div style="margin-top:auto; text-align:center; padding-bottom:10px;">
                <div id="my-email-display" style="font-size:12px; color:#bbb; margin-bottom:8px;"></div>
                <button class="btn" style="width:100%; background:#bbb;" onclick="auth.signOut(); location.reload();">로그아웃</button>
            </div>
        </div>
    </div>

    <script>
        // --- Firebase 설정 ---
        const firebaseConfig = { apiKey: "AIzaSyAXvLdG9GkRw40m5goknTrnYo5bXYlUGG4", authDomain: "freechat-84dc6.firebaseapp.com", projectId: "freechat-84dc6", storageBucket: "freechat-84dc6.firebasestorage.app", messagingSenderId: "333935980429", appId: "1:333935980429:web:7a8eb313e44a39d47cd7c4" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();
        let my = null; let currentDMId = null; let currentGroupId = null; let requestTimers = {};

        // --- 비밀번호 토글 함수 ---
        function togglePassword(id, el) {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text"; el.innerText = "🔒";
            } else {
                input.type = "password"; el.innerText = "👁️";
            }
        }

        function formatFullDate(ts) {
            if(!ts) return "";
            const d = ts.toDate();
            const year = d.getFullYear(); const month = d.getMonth() + 1; const date = d.getDate();
            const ampm = d.getHours() >= 12 ? "오후" : "오전";
            const h = d.getHours() % 12 || 12; const m = String(d.getMinutes()).padStart(2, '0');
            return `${year}년 ${month}월 ${date}일 ${ampm} ${h}:${m}`;
        }

        // --- 로그인 및 상태 체크 (실패 안내 추가) ---
        async function login() {
            const e = document.getElementById('email').value; const p = document.getElementById('password').value;
            if(!e || !p) return alert("이메일과 비밀번호를 입력해주세요.");
            try { 
                await auth.signInWithEmailAndPassword(e,p); 
            } catch (err) { 
                if(err.code === 'auth/wrong-password') {
                    alert("로그인 실패: 비밀번호가 일치하지 않습니다.");
                } else if(err.code === 'auth/user-not-found') {
                    // 사용자가 없으면 회원가입 시도
                    try { await auth.createUserWithEmailAndPassword(e,p); } catch(e2) { alert("가입 실패: " + e2.message); }
                } else {
                    alert("로그인에 실패했습니다: " + err.message);
                }
            }
        }

        auth.onAuthStateChanged(async user => {
            if(user) {
                const doc = await db.collection("users").doc(user.uid).get();
                if(doc.exists) {
                    my = doc.data(); my.uid = user.uid;
                    document.getElementById('auth-section').style.display='none';
                    document.getElementById('sidebar').style.display='flex';
                    document.getElementById('main-content').style.display='flex';
                    document.getElementById('edit-nick').value = my.nickname;
                    document.getElementById('edit-id').value = my.userId;
                    document.getElementById('my-email-display').innerText = user.email;
                    loadPublicMsgs(); listenToRequests(); loadGroups(); searchUser();
                } else {
                    document.getElementById('auth-section').style.display='none';
                    document.getElementById('setup-section').style.display='flex';
                }
            }
        });

        async function saveInitialProfile() {
            const n = document.getElementById('setup-nick').value; const i = document.getElementById('setup-id').value.toLowerCase().trim();
            if(n.length < 1 || n.length > 100) return alert("닉네임은 1~100자 사이로 입력해주세요.");
            if(i.length < 4 || i.length > 50) return alert("아이디는 4~50자 사이로 입력해주세요.");
            
            // 아이디 형식 검사 (영문, 숫자, ., _만 허용)
            const idRegex = /^[a-z0-9._]+$/;
            if(!idRegex.test(i)) return alert("아이디는 영문자, 숫자, 마침표(.), 밑줄(_)만 사용 가능합니다.");

            const check = await db.collection("users").where("userId", "==", i).get();
            if(!check.empty) return alert("이미 존재하는 아이디입니다.");
            await db.collection("users").doc(auth.currentUser.uid).set({ nickname: n, userId: i, friends: [], requests: [], sentRequests: [], lastIdUpdate: firebase.firestore.FieldValue.serverTimestamp() });
            location.reload();
        }

        function renderMsg(doc) {
            const m = doc.data();
            const isMe = m.senderId === my.uid;
            if(m.system) return `<div style="text-align:center; font-size:11px; color:#888; margin:10px 0; background:#f0f0f0; padding:4px; border-radius:4px;">${m.text}</div>`;
            return `
            <div class="msg-bar ${isMe ? 'me' : 'other'}">
                <div class="msg-header">
                    <span class="msg-nick">${m.nickname}(@${m.userId})</span>
                    <span class="msg-date">${formatFullDate(m.timestamp)}</span>
                </div>
                <div class="msg-content">${m.text}</div>
            </div>`;
        }

        function changeTab(t, b) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            document.querySelectorAll('.side-btn').forEach(btn => btn.classList.remove('active'));
            b.classList.add('active');
            if(t === 'tab-friends') loadFriends();
            if(t === 'tab-search') searchUser();
        }

        async function sendMsg(col, inputId) {
            const input = document.getElementById(inputId);
            const text = input.value.trim(); if(!text) return;
            await db.collection(col).add({ text, senderId: my.uid, nickname: my.nickname, userId: my.userId, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            input.value = "";
        }
        function loadPublicMsgs() {
            db.collection("public_msgs").orderBy("timestamp").onSnapshot(snap => {
                const box = document.getElementById('chat-window');
                box.innerHTML = snap.docs.map(doc => renderMsg(doc)).join("");
                box.scrollTop = box.scrollHeight;
            });
        }

        function listenToRequests() {
            db.collection("users").doc(my.uid).onSnapshot(doc => {
                const d = doc.data();
                if(d.requests && d.requests.length > 0) {
                    document.getElementById('request-section').style.display='block';
                    document.getElementById('request-list').innerHTML = d.requests.map(r => `
                        <div class="list-item"><span>${r.nick}(@${r.id})</span>
                        <div><button class="btn" style="padding:5px 10px; font-size:12px; background:var(--accent);" onclick="acceptFriend('${r.uid}','${r.nick}','${r.id}')">수락</button>
                        <button class="btn" style="padding:5px 10px; font-size:12px; background:#999;" onclick="rejectFriend('${r.uid}','${r.nick}','${r.id}')">거절</button></div></div>
                    `).join("");
                } else document.getElementById('request-section').style.display='none';
            });
        }
        async function acceptFriend(uid, nick, id) {
            await db.collection("users").doc(my.uid).update({ friends: firebase.firestore.FieldValue.arrayUnion({ uid, nick, id }), requests: firebase.firestore.FieldValue.arrayRemove({ uid, nick, id }) });
            await db.collection("users").doc(uid).update({ friends: firebase.firestore.FieldValue.arrayUnion({ uid: my.uid, nick: my.nickname, id: my.userId }), sentRequests: firebase.firestore.FieldValue.arrayRemove(my.uid) });
            alert("친구 수락 완료!");
        }
        async function rejectFriend(uid, nick, id) {
            await db.collection("users").doc(my.uid).update({ requests: firebase.firestore.FieldValue.arrayRemove({ uid, nick, id }) });
        }
        async function loadFriends() {
            const d = await db.collection("users").doc(my.uid).get();
            const list = document.getElementById('friends-list'); list.innerHTML = "";
            (d.data().friends || []).forEach(f => {
                list.innerHTML += `<div class="list-item"><span><b>${f.nick}</b>(@${f.id})</span><button class="btn" onclick="openDM('${f.uid}','${f.nick}')">채팅</button></div>`;
            });
        }
        function openDM(uid, nick) {
            currentDMId = uid;
            document.getElementById('friends-list-view').style.display='none';
            document.getElementById('dm-view').style.display='flex';
            const dmId = [my.uid, uid].sort().join("_");
            db.collection("dms").doc(dmId).collection("messages").orderBy("timestamp").onSnapshot(snap => {
                const box = document.getElementById('dm-chat');
                box.innerHTML = snap.docs.map(doc => renderMsg(doc)).join("");
                box.scrollTop = box.scrollHeight;
            });
        }
        function backToFriends() { document.getElementById('friends-list-view').style.display='block'; document.getElementById('dm-view').style.display='none'; }
        async function sendDMMsg() {
            const input = document.getElementById('dm-input'); const text = input.value.trim(); if(!text) return;
            const dmId = [my.uid, currentDMId].sort().join("_");
            await db.collection("dms").doc(dmId).collection("messages").add({ text, senderId: my.uid, nickname: my.nickname, userId: my.userId, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            input.value = "";
        }

        function toggleGroupCreate() {
            const ui = document.getElementById('group-create-ui');
            ui.style.display = ui.style.display==='none'?'block':'none';
            if(ui.style.display==='block') {
                const sel = document.getElementById('group-friend-selector'); sel.innerHTML = "";
                my.friends.forEach(f => { sel.innerHTML += `<div><input type="checkbox" class="g-member-chk" value="${f.uid}" data-nick="${f.nick}" data-id="${f.id}"> ${f.nick}(@${f.id})</div>`; });
            }
        }
        async function createGroup() {
            const name = document.getElementById('group-name-input').value.trim();
            const chks = document.querySelectorAll('.g-member-chk:checked');
            if(!name || chks.length === 0) return alert("그룹 이름과 멤버를 선택하세요.");
            let members = [my.uid]; chks.forEach(c => members.push(c.value));
            const newGroup = await db.collection("groups").add({ name, members, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            await db.collection("groups").doc(newGroup.id).collection("messages").add({ system: true, text: `${my.nickname}님이 그룹을 생성했습니다.`, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            document.getElementById('group-create-ui').style.display='none';
        }
        function loadGroups() {
            db.collection("groups").where("members", "array-contains", my.uid).onSnapshot(snap => {
                const list = document.getElementById('groups-list'); list.innerHTML = "";
                snap.forEach(doc => {
                    const g = doc.data();
                    list.innerHTML += `<div class="list-item" onclick="openGroupChat('${doc.id}', '${g.name}')"><span>📢 ${g.name} <small style="color:#aaa;">(${g.members.length})</small></span><small>입장 ></small></div>`;
                });
            });
        }
        function openGroupChat(id, name) {
            currentGroupId = id;
            document.getElementById('group-chat-view').style.display='flex';
            document.getElementById('group-chat-title').innerText = name;
            db.collection("groups").doc(id).onSnapshot(doc => {
                if(doc.exists) document.getElementById('group-member-info').innerText = `멤버 ${doc.data().members.length}명 보기`;
            });
            db.collection("groups").doc(id).collection("messages").orderBy("timestamp").onSnapshot(snap => {
                const box = document.getElementById('group-chat-window');
                box.innerHTML = snap.docs.map(doc => renderMsg(doc)).join("");
                box.scrollTop = box.scrollHeight;
            });
        }
        async function showGroupMembers() {
            const doc = await db.collection("groups").doc(currentGroupId).get();
            let names = [];
            for(let uid of doc.data().members) {
                const u = await db.collection("users").doc(uid).get();
                if(u.exists) names.push(`${u.data().nickname}(@${u.data().userId})`);
            }
            alert("참여 멤버:\n" + names.join("\n"));
        }
        async function leaveGroup() {
            if(!confirm("그룹에서 나가시겠습니까?")) return;
            await db.collection("groups").doc(currentGroupId).update({ members: firebase.firestore.FieldValue.arrayRemove(my.uid) });
            await db.collection("groups").doc(currentGroupId).collection("messages").add({ system:true, text:`${my.nickname}님이 나갔습니다.`, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            document.getElementById('group-chat-view').style.display='none';
        }
        async function sendGroupMsg() {
            const input = document.getElementById('group-input'); const text = input.value.trim(); if(!text) return;
            await db.collection("groups").doc(currentGroupId).collection("messages").add({ text, senderId: my.uid, nickname: my.nickname, userId: my.userId, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            input.value = "";
        }

        async function searchUser() {
            const sid = document.getElementById('search-input').value.toLowerCase().trim();
            const snap = await db.collection("users").get();
            const res = document.getElementById('search-result'); res.innerHTML = "";
            snap.forEach(doc => {
                const u = doc.data(); if(doc.id === my.uid) return;
                if(sid === "" || u.userId.includes(sid) || u.nickname.toLowerCase().includes(sid)) {
                    const isFriend = my.friends && my.friends.some(f => f.uid === doc.id);
                    const isPending = my.sentRequests && my.sentRequests.includes(doc.id);
                    res.innerHTML += `<div class="list-item">
                        <span>${u.nickname}(@${u.userId})</span>
                        ${isFriend ? '<b style="color:var(--accent);">친구</b>' : `
                            <button class="btn" id="btn-${doc.id}" onclick="handleFriendReq('${doc.id}','${u.nickname}','${u.userId}')" style="${isPending?'background:#999':''}">
                                ${isPending ? '신청됨' : '요청'}
                            </button>
                        `}
                    </div>`;
                }
            });
        }
        async function handleFriendReq(tid, nick, id) {
            const btn = document.getElementById(`btn-${tid}`);
            if(btn.innerText === '요청') {
                await db.collection("users").doc(tid).update({ requests: firebase.firestore.FieldValue.arrayUnion({ uid: my.uid, nick: my.nickname, id: my.userId }) });
                await db.collection("users").doc(my.uid).update({ sentRequests: firebase.firestore.FieldValue.arrayUnion(tid) });
                my.sentRequests.push(tid); btn.innerText = '신청됨'; btn.style.background = "#999"; requestTimers[tid] = Date.now();
            } else {
                const diff = (Date.now() - (requestTimers[tid]||0))/1000;
                if(diff < 5) return alert(`${Math.ceil(5-diff)}초 후 취소 가능`);
                await db.collection("users").doc(tid).update({ requests: firebase.firestore.FieldValue.arrayRemove({ uid: my.uid, nick: my.nickname, id: my.userId }) });
                await db.collection("users").doc(my.uid).update({ sentRequests: firebase.firestore.FieldValue.arrayRemove(tid) });
                my.sentRequests = my.sentRequests.filter(i => i !== tid); btn.innerText = '요청'; btn.style.background = "var(--dark)";
            }
        }

        async function updateNick() {
            const n = document.getElementById('edit-nick').value; if(n.length<1 || n.length>100) return alert("1~100자");
            await db.collection("users").doc(my.uid).update({ nickname: n }); alert("저장되었습니다."); location.reload();
        }
        async function updateID() {
            const nid = document.getElementById('edit-id').value.toLowerCase().trim();
            if(nid.length<4 || nid.length>50) return alert("4~50자");
            const lastUpdate = my.lastIdUpdate?.toDate ? my.lastIdUpdate.toDate() : new Date(0);
            if((new Date() - lastUpdate) / (1000*60*60*24) < 7) return alert("7일 후에 변경 가능합니다.");
            const check = await db.collection("users").where("userId", "==", nid).get();
            if(!check.empty) return alert("중복된 아이디입니다.");
            await db.collection("users").doc(my.uid).update({ userId: nid, lastIdUpdate: firebase.firestore.FieldValue.serverTimestamp() });
            alert("변경되었습니다."); location.reload();
        }

        window.addEventListener('online', () => document.getElementById('offline-overlay').style.display='none');
        window.addEventListener('offline', () => document.getElementById('offline-overlay').style.display='flex');
    </script>
</body>
</html>
